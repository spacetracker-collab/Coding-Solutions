apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourceaudits.kubewise.io
  annotations:
    description: "Triggers on-demand cluster hygiene scans and reports findings"
spec:
  group: kubewise.io
  names:
    kind: ResourceAudit
    listKind: ResourceAuditList
    plural: resourceaudits
    singular: resourceaudit
    shortNames:
      - ra
      - audit
    categories:
      - kubewise
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: >
            ResourceAudit triggers an on-demand scan of the cluster to detect
            stale and orphaned resources. Results are stored in the status field.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: "Specification of the audit scan"
              properties:
                targetNamespaces:
                  type: array
                  description: >
                    Namespaces to scan. If empty, all non-system namespaces are scanned.
                  items:
                    type: string
                excludedNamespaces:
                  type: array
                  description: "Namespaces to exclude from the scan"
                  default:
                    - kube-system
                    - kube-public
                    - kube-node-lease
                  items:
                    type: string
                scanTypes:
                  type: array
                  description: >
                    Resource types to include in the scan. Defaults to all supported types.
                  default:
                    - ConfigMap
                    - Secret
                    - PersistentVolumeClaim
                    - Service
                    - Job
                    - ReplicaSet
                  items:
                    type: string
                    enum:
                      - ConfigMap
                      - Secret
                      - PersistentVolumeClaim
                      - Service
                      - Job
                      - ReplicaSet
            status:
              type: object
              description: "Audit scan results"
              properties:
                phase:
                  type: string
                  description: "Current phase (Running, Completed, Error)"
                completedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when the audit completed"
                totalStaleResources:
                  type: integer
                  description: "Total number of stale resources found"
                summary:
                  type: object
                  description: "Count of stale resources by kind"
                  additionalProperties:
                    type: integer
                findings:
                  type: array
                  description: "Detailed list of stale resources found (limited to 100)"
                  items:
                    type: object
                    properties:
                      kind:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                      reason:
                        type: string
                      age:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Total Stale
          type: integer
          jsonPath: .status.totalStaleResources
        - name: Completed At
          type: string
          jsonPath: .status.completedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
