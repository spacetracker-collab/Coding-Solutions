apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubewise-operator.fullname" . }}
  labels:
    {{- include "kubewise-operator.labels" . | nindent 4 }}
rules:
  # Custom resources
  - apiGroups: ["kubewise.io"]
    resources:
      - cleanuppolicies
      - cleanuppolicies/status
      - resourceaudits
      - resourceaudits/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Read namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

  # Read workloads for reference checking
  - apiGroups: [""]
    resources: ["pods", "serviceaccounts"]
    verbs: ["get", "list", "watch"]

  # Manage stale resources (read + delete)
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "persistentvolumeclaims", "services", "endpoints"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "delete"]

  # Events for audit trail
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Kopf internals
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["list", "watch"]
