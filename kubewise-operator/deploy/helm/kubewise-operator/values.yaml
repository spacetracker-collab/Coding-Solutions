# KubeWise Operator - Helm Values
# Default values for the kubewise-operator chart.

# -- Number of operator replicas (should be 1 for leader election)
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/spacetracker-collab/kubewise-operator
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full chart name
fullnameOverride: ""

serviceAccount:
  # -- Create a service account
  create: true
  # -- Service account name (auto-generated if empty)
  name: ""
  # -- Annotations for the service account
  annotations: {}

# -- Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

metrics:
  # -- Enable Prometheus metrics
  enabled: true
  # -- Metrics port
  port: 9090

  serviceMonitor:
    # -- Create a ServiceMonitor for Prometheus Operator
    enabled: false
    # -- Additional labels for the ServiceMonitor
    additionalLabels: {}
    # -- Scrape interval
    interval: 30s
