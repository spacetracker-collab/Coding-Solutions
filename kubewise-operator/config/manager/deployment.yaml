apiVersion: v1
kind: Namespace
metadata:
  name: kubewise-system
  labels:
    app.kubernetes.io/name: kubewise-operator
    app.kubernetes.io/part-of: kubewise
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubewise-operator
  namespace: kubewise-system
  labels:
    app.kubernetes.io/name: kubewise-operator
    app.kubernetes.io/part-of: kubewise
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubewise-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubewise-operator
        app.kubernetes.io/part-of: kubewise
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kubewise-operator
      containers:
        - name: operator
          image: ghcr.io/kubewise-operator/kubewise-operator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 10
