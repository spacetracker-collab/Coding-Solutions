apiVersion: batch/v1
kind: Job
metadata:
  name: english-french-translator-job
  labels:
    app: english-french-translator
spec:
  template:
    metadata:
      labels:
        app: english-french-translator
    spec:
      containers:
        - name: translator
          image: spacetracker/english-french-translator:latest
          args: ["hello"]
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      restartPolicy: Never
  backoffLimit: 3
